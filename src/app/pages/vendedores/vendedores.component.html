<div class="vendedores">
    <div class="summary-card">
      <div class="summary-header">
        <span class="summary-title"><mat-icon>attach_money</mat-icon> Gestión de Vendedores</span>
        <!-- <span class="summary-date"><mat-icon>calendar_today</mat-icon> {{ today | date:'d/M/yyyy' }}</span> -->
      </div>
      <div class="summary-content">
        <div class="summary-item">
          <div class="item-title">Numero de vendedores</div>
          <div class="item-value net">{{totalSellers}}</div>
          <!-- <mat-icon class="item-icon">trending_up</mat-icon> -->
        </div>
        <div class="summary-item">
          <div class="item-title">Numero de vendedores</div>
          <div class="item-value">{{totalSellers}}</div>
          <!-- <div class="item-sub">Margen: {{ margin | percent:'1.1-1' }}</div> -->
        </div>
        <div class="summary-item">
          <div class="item-title">Numero de vendedores</div>
          <div class="item-value">{{totalSellers}}</div>
          <!-- <div class="item-sub">Promedio: S/ {{ avgSale | number:'1.2-2' }}</div> -->
        </div>
      </div>
    </div>
    <div class="vendedores-controls">
        <mat-form-field>
            <mat-label>Buscar</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="" #input>
        </mat-form-field>
        <div class="controls">
            <button *ngIf="this.permissions == 1 ? true : false" class="btn-add" (click)="openDialogPin()">Nuevo Vendedor</button> 
        </div>
    </div>
    <div class="mat-elevation-z8">
        <table mat-table [dataSource]="dataSource" matSort>
          <!-- nombreVendedor Column -->
          <ng-container matColumnDef="nombreVendedor">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Nombre Vendedor </th>
            <td mat-cell *matCellDef="let row"> {{row.nombreVendedor}} </td>
          </ng-container>

          <!-- aliasVendedor Column -->
          <ng-container matColumnDef="aliasVendedor">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Alias Vendedor </th>
            <td mat-cell *matCellDef="let row"> {{row.aliasVendedor}} </td>
          </ng-container>

          <!-- actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Acciones</th>
            <td mat-cell *matCellDef="let row">
              <div class="btn-actions">
                <!-- <button [disabled]="this.permissions == 0" (click)="openDialogInfoSale(row)"><mat-icon fontIcon="visibility" ></mat-icon></button> -->
                <button [disabled]="this.permissions == 0" (click)="openDialogInfoSeller(row)"><mat-icon fontIcon="visibility" ></mat-icon></button>
                <button [disabled]="this.permissions == 0" (click)="openDialogPinUpdate(row)"><mat-icon fontIcon="edit" ></mat-icon></button>
                <button [disabled]="this.permissions == 0" (click)="openDeleteSellerSwal(row.id)"><mat-icon fontIcon="delete" ></mat-icon></button>
              </div>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
          <!-- Row shown when there is no matching data. -->
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
          </tr>
        </table>
      
        <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of users"></mat-paginator>
    </div>

</div>
